# ─────────────────────────────────────────────────────────────────────────────
# Course au PIB mondial — Format TikTok
# Usage : python generate.py configs/pays_pib_tiktok.yaml
# ─────────────────────────────────────────────────────────────────────────────

title: "Course au PIB"
subtitle: "PIB en T$ · 2000 → 2024"

format: tiktok

source:
  type: world_bank
  indicator: NY.GDP.MKTP.CD
  start_year: 2000
  scale: 1.0e12                # USD → trillions de dollars

  countries:
    USA: États-Unis
    CHN: Chine
    DEU: Allemagne
    JPN: Japon
    IND: Inde
    GBR: Royaume-Uni
    FRA: France
    ITA: Italie
    BRA: Brésil
    CAN: Canada

colors:
  États-Unis: [178,  34,  52]
  Chine:      [222,  41,  16]
  Allemagne:  [110, 110, 110]
  Japon:      [200,   0,  40]
  Inde:       [255, 153,  51]
  Royaume-Uni: [  0,  36, 125]
  France:     [  0,  35, 149]
  Italie:     [  0, 146,  70]
  Brésil:     [  0, 156,  59]
  Canada:     [255,   0,   0]

display:
  bars: 10
  time_format: year

output:
  file: "output/pays_pib_tiktok.mp4"
  fps: 30
  duration: 60
