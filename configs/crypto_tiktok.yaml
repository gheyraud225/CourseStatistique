# ─────────────────────────────────────────────────────────────────────────────
# Course Crypto — Prix absolu — Format TikTok
# Usage : python generate.py configs/crypto_tiktok.yaml
#
# Montre le prix réel en USD. Bitcoin domine, mais les cycles sont visibles.
# Pour une course plus serrée, voir crypto_performance_tiktok.yaml
# ─────────────────────────────────────────────────────────────────────────────

title: "Crypto Battle"
subtitle: "Prix de clôture en USD · 2018 → aujourd'hui"

format: tiktok

source:
  type: crypto
  start: "2018-01-01"
  interval: "1wk"

  tickers:
    BTC-USD:  Bitcoin
    ETH-USD:  Ethereum
    DOGE-USD: Dogecoin
    BNB-USD:  Binance
    SOL-USD:  Solana
    XRP-USD:  Ripple

colors:
  Bitcoin:  [247, 147,  26]
  Ethereum: [ 98, 126, 234]
  Dogecoin: [195, 175,   0]
  Binance:  [240, 185,  11]
  Solana:   [153,  69, 255]
  Ripple:   [  0, 170, 228]

display:
  bars: 6
  font_size: 28
  time_format: month

output:
  file: "output/crypto_tiktok.mp4"
  fps: 30
  duration: 60
