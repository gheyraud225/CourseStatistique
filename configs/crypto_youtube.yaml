# ─────────────────────────────────────────────────────────────────────────────
# Course Crypto — Format YouTube (16:9)
# Usage : python generate.py configs/crypto_youtube.yaml
# ─────────────────────────────────────────────────────────────────────────────

title: "Crypto Battle 2018–2025"
subtitle: "Évolution des prix de clôture en USD"

format: youtube

source:
  type: crypto
  start: "2018-01-01"
  interval: "1wk"

  tickers:
    BTC-USD:  Bitcoin
    ETH-USD:  Ethereum
    DOGE-USD: Dogecoin
    BNB-USD:  Binance
    SOL-USD:  Solana
    XRP-USD:  Ripple

colors:
  Bitcoin:  [247, 147,  26]
  Ethereum: [ 98, 126, 234]
  Dogecoin: [195, 175,   0]
  Binance:  [240, 185,  11]
  Solana:   [153,  69, 255]
  Ripple:   [  0, 170, 228]

display:
  bars: 6
  time_format: month

output:
  file: "output/crypto_youtube.mp4"
  fps: 30
  duration: 60
