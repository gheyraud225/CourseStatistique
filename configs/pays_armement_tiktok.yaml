# ─────────────────────────────────────────────────────────────────────────────
# Course à l'Armement — Format TikTok
# Usage : python generate.py configs/pays_armement_tiktok.yaml
#
# La montée en puissance de la Chine de 2000 à 2024 est spectaculaire.
# La Russie grimpe soudainement après 2014 (Crimée) puis 2022 (Ukraine).
# Course géopolitique vraiment captivante !
# ─────────────────────────────────────────────────────────────────────────────

title: "Course à l'Armement"
subtitle: "Dépenses militaires en Md$ · 2000 → 2024"

format: tiktok

source:
  type: world_bank
  indicator: MS.MIL.XPND.CD
  start_year: 2000
  scale: 1.0e9                 # USD → milliards de dollars

  countries:
    USA: États-Unis
    CHN: Chine
    RUS: Russie
    GBR: Royaume-Uni
    DEU: Allemagne
    SAU: Arabie Saoudite
    IND: Inde
    FRA: France
    JPN: Japon
    KOR: Corée du Sud
    AUS: Australie
    ISR: Israël
    ITA: Italie
    UKR: Ukraine
    POL: Pologne

colors:
  États-Unis:       [178,  34,  52]
  Chine:            [222,  41,  16]
  Russie:           [  0,  57, 166]
  Royaume-Uni:      [  0,  36, 125]
  Allemagne:        [110, 110, 110]
  Arabie Saoudite:  [ 96, 171,  89]
  Inde:             [255, 153,  51]
  France:           [  0,  85, 164]
  Japon:            [200,   0,  40]
  Corée du Sud:     [  0,  71, 160]
  Australie:        [  0,  70, 127]
  Israël:           [  0,  56, 184]
  Italie:           [  0, 146,  70]
  Ukraine:          [  0,  87, 183]
  Pologne:          [220,  20,  60]

display:
  bars: 10
  time_format: year

output:
  file: "output/pays_armement_tiktok.mp4"
  fps: 30
  duration: 60
